<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Akses Konten</title>

<!-- 🔥 PASTE SCRIPT IKLAN DI SINI -->
<script type='text/javascript' src='//YOUR_AD_SCRIPT.js'></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
}

body {
  height: 100vh;
  background: url('https://i.imgur.com/OtX8nDM.gif') no-repeat center center;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* overlay */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
}

/* container */
.box {
  position: relative;
  z-index: 2;
  width: 92%;
  max-width: 340px;
  text-align: center;
}

/* watermark */
.watermark {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.watermark span {
  color: #ff8c00;
}

/* info */
.info {
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 15px;
}

/* tombol */
.btn {
  padding: 16px;
  border-radius: 14px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(14px);
  color: white;
  font-weight: bold;
  border: 1px solid rgba(255,255,255,0.2);
  cursor: pointer;
  transition: 0.2s;
}

.btn:active {
  transform: scale(0.97);
}

/* loader */
.loader {
  display: none;
}

.text {
  margin-top: 15px;
  font-size: 14px;
}

/* progress */
.progress {
  width: 100%;
  height: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.2);
  overflow: hidden;
  margin-top: 15px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: white;
}
</style>
</head>

<body>

<div class="box">

  <div class="watermark">
    OKEP <span>INDOH</span>.COM
  </div>

  <div class="info">
    Klik tombol di bawah untuk lanjut
  </div>

  <!-- tombol -->
  <div id="start">
    <div class="btn" onclick="startProcess()">LANJUTKAN</div>
  </div>

  <!-- loader -->
  <div id="loader" class="loader">
    <div class="text" id="text">Menghubungkan...</div>

    <div class="progress">
      <div class="progress-bar" id="bar"></div>
    </div>
  </div>

</div>

<script>

/* 🔁 ROTATOR LINK */
const links = [
  "https://thorpejoy.com/gi5r2qhb41?key=bf2e66ef06dd4b382dffd31241ed7c68",
  "https://thorpejoy.com/keixcm4smy?key=2315840c32c604f283d2954fb9999eaa"
];

function getRandomLink() {
  return links[Math.floor(Math.random() * links.length)];
}

/* ▶️ START PROCESS */
function startProcess() {
  document.getElementById("start").style.display = "none";
  document.getElementById("loader").style.display = "block";

  let progress = 0;
  let bar = document.getElementById("bar");
  let text = document.getElementById("text");

  const texts = [
    "Menghubungkan...",
    "Memuat data...",
    "Memverifikasi akses...",
    "Menyiapkan konten..."
  ];

  let interval = setInterval(() => {
    progress += Math.random() * 8;

    if (progress >= 100) {
      progress = 100;
      clearInterval(interval);

      setTimeout(() => {
        window.location.href = getRandomLink();
      }, 1000);
    }

    bar.style.width = progress + "%";

    if (Math.random() > 0.7) {
      text.innerText = texts[Math.floor(Math.random() * texts.length)];
    }

  }, 200);
}
</script>

</body>
</html>
