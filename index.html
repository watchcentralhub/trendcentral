<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trend Central</title>

<style>
body {
  margin:0;
  height:100vh;
  font-family: Arial, sans-serif;
  background:url('https://i.imgur.com/OtX8nDM.gif') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
}

.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.box {
  position:relative;
  z-index:2;
  width:90%;
  max-width:320px;
  text-align:center;
}

.card {
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:12px;
}

button {
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.progress {
  height:8px;
  background:#444;
  border-radius:8px;
  overflow:hidden;
  margin-top:10px;
}

.bar {
  height:100%;
  width:0%;
  background:#4caf50;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="box">
  <div class="card">

    <h2>Trend Central</h2>
    <p>Klik untuk membuka konten</p>

    <div id="start">
      <button onclick="start()">Lihat Sekarang</button>
    </div>

    <div id="loading" style="display:none;">
      <p id="text">Memproses...</p>

      <div class="progress">
        <div class="bar" id="bar"></div>
      </div>

      <p id="percent">0%</p>
    </div>

  </div>
</div>

<script>
const links = [
 "https://thorpejoy.com/gi5r2qhb41?key=bf2e66ef06dd4b382dffd31241ed7c68",
 "https://thorpejoy.com/keixcm4smy?key=2315840c32c604f283d2954fb9999eaa"
];

function start(){
  document.getElementById("start").style.display="none";
  document.getElementById("loading").style.display="block";

  let p=0;
  let bar=document.getElementById("bar");

  let i=setInterval(()=>{
    p+=10;
    bar.style.width=p+"%";
    document.getElementById("percent").innerText=p+"%";

    if(p>=100){
      clearInterval(i);
      window.location.href = links[Math.floor(Math.random()*links.length)];
    }
  },200);
}
</script>

</body>
</html>
